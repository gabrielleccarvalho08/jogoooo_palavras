<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>

    <link rel="stylesheet" href="index.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="credits-top">
        <span>Desenvolvido por <strong>Gabrielle</strong></span>
    </div>

    <div class="container">

        <div class="accent-badge"></div>

        <h1>Jogo das <span>Palavras</span></h1>

        <!-- TELA INICIAL -->
        <div id="setup-container" class="setup-card">

            <div class="input-group">

                <input
                    type="text"
                    id="nickname-input"
                    placeholder="seu nome"
                    autocomplete="off"
                    onkeydown="iniciarJogo(event)">

                <div class="input-decoration"></div>

            </div>

            <div class="difficulty-selection">

                <label>
                    <input type="radio" name="difficulty" value="facil" checked>
                    <span>fácil</span>
                </label>

                <label>
                    <input type="radio" name="difficulty" value="medio">
                    <span>médio</span>
                </label>

                <label>
                    <input type="radio" name="difficulty" value="dificil">
                    <span>difícil</span>
                </label>

            </div>

            <p class="hint-press">
                ↺ aperte enter para começar
            </p>

        </div>

        <!-- TELA DO JOGO -->
        <div id="game-container" class="hidden game-card">

            <div class="header-tags">

                <div class="player-tag">
                    <span class="tag-dot"></span>
                    <span id="player-display"></span>
                </div>

                <div class="level-tag">
                    <span id="level-display"></span>
                </div>

            </div>

            <!-- DICA -->
            <div id="tip-container" class="tip-container hidden">

                <span class="tip-icon">💡</span>

                <span id="tip-text" class="tip-text"></span>

            </div>

            <!-- PALAVRA -->
            <div id="word-display" class="word-slots"></div>

            <!-- INPUT DA LETRA -->
            <div class="letter-crystal">

                <input
                    type="text"
                    id="letter-input"
                    maxlength="1"
                    placeholder="?"
                    autocomplete="off"
                    onkeydown="tentarLetra(event)">

                <label class="letter-label">
                    digite uma letra
                </label>

            </div>

            <!-- PAINEL -->
            <div class="info-panel">

                <div class="error-meter">

                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">

                        <path
                            d="M12 8V12M12 16H12.01M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            stroke="#e8a9c4"
                            stroke-width="1.5"
                            stroke-linecap="round"/>

                    </svg>

                    <span id="error-count">0</span>
                    <span>/ 4</span>

                </div>

                <div id="game-message" class="message-bubble"></div>

            </div>

            <!-- BOTÃO -->
            <button
                onclick="reiniciarJogo()"
                id="reset-btn"
                class="reset-btn hidden">

                <span>✦</span>
                nova partida
                <span>✦</span>

            </button>

        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
